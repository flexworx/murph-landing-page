# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for thynx.ai
# Sits behind Cloudflare tunnel — no SSL termination needed here
# (Cloudflare handles HTTPS end-to-end)
# ─────────────────────────────────────────────────────────────────────────────

# Default server: reject unknown hostnames (prevents catch-all interception)
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name thynx.ai www.thynx.ai;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Increase body size for document uploads (up to 50MB)
    client_max_body_size 50M;

    # Proxy all requests to the Thynx Node.js app
    location / {
        proxy_pass         http://thynx:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check endpoint (used by Cloudflare health monitors)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
