# ─────────────────────────────────────────────────────────────────────────────
# Thynx — Self-Hosted Voice App Stack
# Runs on your Dell R7625 VM behind Cloudflare tunnel
#
# Services:
#   thynx      — Node.js app (React frontend + tRPC API)  → port 3000
#   piper      — Self-hosted TTS (Piper, OpenAI-compatible) → port 8880
#   whisper    — Self-hosted STT (faster-whisper)           → port 9000
#   nginx      — Reverse proxy for thynx.ai                 → port 80
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f thynx
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Thynx App ──────────────────────────────────────────────────────────────
  thynx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thynx
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      TTS_API_URL: "http://piper:8880"
      STT_API_URL: "http://whisper:9000"
    depends_on:
      - piper
      - whisper
    networks:
      - thynx-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/trpc/system.health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Piper TTS HTTP server (custom wrapper with REST API) ────────────────────
  # Wraps piper-tts Python package with FastAPI: POST /api/tts?voice=<voice>
  # Compatible with callPiperTTS() in server/routers.ts
  piper:
    build:
      context: ./piper-http
      dockerfile: Dockerfile
    container_name: piper
    restart: unless-stopped
    environment:
      VOICES_DIR: /data/voices
    ports:
      - "8880:8880"
    volumes:
      - piper-voices:/data/voices
    networks:
      - thynx-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── faster-whisper STT (self-hosted, OpenAI-compatible) ───────────────────
  whisper:
    image: fedirz/faster-whisper-server:0.6.0-rc.3-cpu
    container_name: whisper
    restart: unless-stopped
    environment:
      - WHISPER__MODEL=base.en
      - WHISPER__INFERENCE_DEVICE=cpu
    volumes:
      - whisper-models:/root/.cache/huggingface
    networks:
      - thynx-net

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: thynx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/thynx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - thynx
    networks:
      - thynx-net

networks:
  thynx-net:
    driver: bridge

volumes:
  piper-voices:
  whisper-models:
